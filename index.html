  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #4C19D8;
    --purple-dark: #3610A2;
    --purple-light: #EFEBFF;
    --purple-mid: #EAE3FC;
    --lime: #CCFCA8;
    --lime-dark: #53A826;
    --black: #000000;
    --near-black: #0B0B0B;
    --dark: #141414;
    --mid: #2F2F2F;
    --gray: #555;
    --light-gray: #D5D5D5;
    --white: #FFFFFF;
    --off-white: #FFFCFC;
    --text: #FFFFFF;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--near-black);
    padding: 0;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid var(--mid);
  }

  .header-inner {
    max-width: 1000px;
    margin: 0 auto;
    padding: 52px 40px 56px;
    position: relative;
  }

  .header-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 16px;
  }

  .header-title {
    font-size: 36px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 10px;
    color: var(--white);
  }

  .header-title span { color: var(--purple); }

  .header-subtitle {
    font-size: 15px;
    color: #aaa;
    margin-bottom: 28px;
    max-width: 480px;
    line-height: 1.6;
  }

  .header-meta {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .header-stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .header-stat-val {
    font-size: 22px;
    font-weight: 800;
    color: var(--lime);
  }

  .header-stat-label {
    font-size: 11px;
    color: #777;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* RETAILER TABS */
  .tabs-wrap {
    background: var(--near-black);
    border-bottom: 1px solid var(--mid);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .tabs {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 40px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
  }

  .tab {
    padding: 16px 20px;
    font-size: 13px;
    font-weight: 600;
    color: #888;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    outline: none;
    font-family: inherit;
  }

  .tab:hover { color: var(--white); }

  .tab.active {
    color: var(--white);
    border-bottom-color: var(--purple);
  }

  .tab .receipt-count {
    font-size: 11px;
    font-weight: 500;
    color: #666;
    margin-left: 6px;
  }

  .tab.active .receipt-count { color: #aaa; }

  /* CONTENT */
  .content {
    max-width: 1000px;
    margin: 0 auto;
    padding: 40px;
  }

  .section {
    margin-bottom: 48px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .section-icon {
    font-size: 20px;
  }

  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--white);
  }

  .section-sub {
    font-size: 13px;
    color: #666;
    margin-left: auto;
  }

  /* RETAILER STATS BANNER */
  .retailer-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }

  .stat-card {
    background: var(--near-black);
    border: 1px solid var(--mid);
    border-radius: 12px;
    padding: 20px 24px;
  }

  .stat-card-val {
    font-size: 28px;
    font-weight: 800;
    color: var(--lime);
    margin-bottom: 4px;
  }

  .stat-card-label {
    font-size: 12px;
    color: #777;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* BRAND CARDS */
  .brand-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }

  .brand-card {
    background: var(--near-black);
    border: 1px solid var(--mid);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.15s;
  }

  .brand-card:hover { border-color: #444; }

  .brand-emoji {
    font-size: 24px;
    flex-shrink: 0;
  }

  .brand-info { flex: 1; min-width: 0; }

  .brand-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .brand-stats {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }

  .brand-count {
    font-size: 20px;
    font-weight: 800;
    color: var(--purple-light);
    flex-shrink: 0;
  }

  /* CATEGORY TABLE */
  .category-table {
    width: 100%;
    border-collapse: collapse;
  }

  .category-table th {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #666;
    text-align: left;
    padding: 0 0 12px;
    border-bottom: 1px solid var(--mid);
  }

  .category-table th:last-child { text-align: right; }

  .category-table td {
    padding: 11px 0;
    border-bottom: 1px solid #1a1a1a;
    font-size: 14px;
    color: var(--white);
  }

  .category-table td:last-child {
    text-align: right;
    color: #888;
    font-size: 13px;
  }

  .category-bar-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .category-bar {
    height: 4px;
    background: var(--purple);
    border-radius: 2px;
    min-width: 2px;
    flex-shrink: 0;
  }

  .category-count {
    font-size: 13px;
    color: #aaa;
    min-width: 40px;
    text-align: right;
  }

  /* PRICE BUCKETS */
  .price-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
  }

  .price-card {
    background: var(--near-black);
    border: 1px solid var(--mid);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .price-label {
    font-size: 12px;
    color: #777;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .price-pct {
    font-size: 26px;
    font-weight: 800;
    color: var(--lime);
  }

  .price-count {
    font-size: 11px;
    color: #555;
    margin-top: 4px;
  }

  /* INSIGHTS */
  .insight-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .insight {
    background: var(--near-black);
    border: 1px solid var(--mid);
    border-radius: 12px;
    padding: 18px 22px;
    display: flex;
    gap: 16px;
  }

  .insight-num {
    font-size: 13px;
    font-weight: 800;
    color: var(--purple-light);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .insight-text {
    font-size: 14px;
    line-height: 1.6;
    color: #ccc;
  }

  .insight-text strong { color: var(--white); }

  /* EMPTY STATE */
  .empty-state {
    background: var(--near-black);
    border: 1px solid var(--mid);
    border-radius: 12px;
    padding: 32px;
    text-align: center;
    color: #666;
    font-size: 14px;
  }

  /* METHODOLOGY NOTE */
  .methodology {
    background: #0d0d0d;
    border: 1px solid #1a1a1a;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 12px;
    color: #555;
    line-height: 1.6;
    margin-top: 40px;
  }

  .methodology strong { color: #777; }

  @media (max-width: 700px) {
    .header-inner { padding: 32px 20px 36px; }
    .content { padding: 24px 20px; }
    .tabs { padding: 0 20px; }
    .header-title { font-size: 26px; }
    .retailer-stats { grid-template-columns: 1fr; }
    .price-grid { grid-template-columns: repeat(3, 1fr); }
  }
</style>

}

function fmt(n) {
  return n >= 1000 ? (n / 1000).toFixed(1) + 'K' : n.toString();
}

function renderContent() {
  const data = currentTab === 'all' ? ALL_DATA : RETAILER_DATA[currentTab];
  const retailerLabel = currentTab === 'all' ? 'All Retailers' : currentTab;
  const receiptShare = currentTab === 'all' ? '100%' :
    Math.round(data.receiptCount / 39684 * 100) + '%';

  let html = '';

  // Stats banner
  html += `<div class="retailer-stats">
    <div class="stat-card">
      <div class="stat-card-val">${fmt(data.receiptCount)}</div>
      <div class="stat-card-label">Receipts at ${retailerLabel}</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-val">${data.avgItems}</div>
      <div class="stat-card-label">Avg items per trip</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-val">${receiptShare}</div>
      <div class="stat-card-label">Share of total receipts</div>
    </div>
  </div>`;

  // Co-purchase brands
  html += `<div class="section">
    <div class="section-header">
      <span class="section-icon">🛍️</span>
      <span class="section-title">Top Brands in the Same Basket</span>
      <span class="section-sub">by receipt count</span>
    </div>`;

  if (data.topBrands && data.topBrands.length > 0) {
    html += `<div class="brand-grid">`;
    for (const b of data.topBrands) {
      html += `<div class="brand-card">
        <span class="brand-emoji">${b.emoji || '🛒'}</span>
        <div class="brand-info">
          <div class="brand-name">${b.name}</div>
          <div class="brand-stats">${b.count} receipts · avg $${b.avgPrice.toFixed(2)}</div>
        </div>
        <span class="brand-count">${b.count}</span>
      </div>`;
    }
    html += `</div>`;
  } else {
    html += `<div class="empty-state">Brand-level data is limited for this retailer cohort — the smaller receipt volume reduces statistical confidence for keyword matching.</div>`;
  }
  html += `</div>`;

  // Category breakdown
  if (data.topCategories && data.topCategories.length > 0) {
    const maxCat = Math.max(...data.topCategories.map(c => c.count));
    html += `<div class="section">
      <div class="section-header">
        <span class="section-icon">📊</span>
        <span class="section-title">Top Product Categories in the Basket</span>
      </div>
      <table class="category-table">
        <thead><tr>
          <th>Category</th>
          <th>Items</th>
          <th>% of Basket</th>
        </tr></thead>
        <tbody>`;
    for (const c of data.topCategories) {
      const barWidth = Math.max(2, Math.round((c.count / maxCat) * 200));
      html += `<tr>
        <td>
          <div class="category-bar-wrap">
            <div class="category-bar" style="width:${barWidth}px"></div>
            ${c.name}
          </div>
        </td>
        <td><span class="category-count">${c.count.toLocaleString()}</span></td>
        <td>${c.pct > 0 ? c.pct.toFixed(1) + '%' : '<0.1%'}</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }

  // Price distribution
  const PRICE_ORDER = ["Under $5", "$5–$10", "$10–$20", "$20–$50", "$50+"];
  const orderedBuckets = PRICE_ORDER.map(label =>
    data.priceBuckets.find(b => b.label === label) || { label, count: 0, pct: 0 }
  );

  html += `<div class="section">
    <div class="section-header">
      <span class="section-icon">💰</span>
      <span class="section-title">Price Distribution</span>
      <span class="section-sub">all items on ${retailerLabel} receipts</span>
    </div>
    <div class="price-grid">`;
  for (const b of orderedBuckets) {
    html += `<div class="price-card">
      <div class="price-label">${b.label}</div>
      <div class="price-pct">${b.pct.toFixed(1)}%</div>
      <div class="price-count">${b.count.toLocaleString()} items</div>
    </div>`;
  }
  html += `</div></div>`;

  // Insights
  if (data.insights && data.insights.length > 0) {
    html += `<div class="section">
      <div class="section-header">
        <span class="section-icon">💡</span>
        <span class="section-title">Aisle Intelligence — ${retailerLabel}</span>
      </div>
      <div class="insight-list">`;
    data.insights.forEach((text, i) => {
      html += `<div class="insight">
        <div class="insight-num">${i + 1}</div>
        <div class="insight-text">${text}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Methodology note
  html += `<div class="methodology">
    <strong>⚠️ Methodology note:</strong> This analysis uses keyword matching on OCR-extracted receipt line items and Aisle's category classification. Brand co-purchase counts reflect receipts where a keyword match was found in the line item text — directional signals, not exact counts. Category data uses Aisle's enumerated classification system. Per-retailer segmentation is based on the <code>storeName</code> field from the receipt image. Results are directional — exact percentages may vary.
  </div>`;

  document.getElementById('tab-content').innerHTML = html;
}

// Initial render
renderContent();
</script>
</body>
</html>
